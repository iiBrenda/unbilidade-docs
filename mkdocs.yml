# Site informações
site_name: UnBilidade
site_description: Plataforma inteligente de gestão de agendamentos para clínicas de fisioterapia
site_author: Equipe Hopper
site_url: https://iiBrenda.github.io/unbilidade-docs/

# Repositório
site_name: UnBilidade
site_url: https://iiBrenda.github.io/unbilidade-docs/  # ← ADICIONE ESTA LINHA
repo_name: GitHub

# Tema Material - Cores de Clínica de Fisioterapia
theme:
  name: material
  language: pt-BR
  features:
    # Navegação suave
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    
    # Busca
    - search.suggest
    - search.highlight
    - search.share
    
    # Conteúdo
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    
    # Header
    - header.autohide
    
    # Animações
    - toc.integrate
    - toc.follow
  
  # PALETA DE CORES - CLÍNICA DE FISIOTERAPIA 💚
  palette:
    # Modo claro (padrão - cores suaves de clínica)
    - scheme: default
      primary: teal
      accent: light-blue
      toggle:
        icon: material/weather-sunny
        name: Modo Claro
    # Modo claro alternativo (mais suave)
    - scheme: default
      primary: light-green
      accent: cyan
      toggle:
        icon: material/leaf
        name: Modo Clínica
    # Modo escuro suave
    - scheme: slate
      primary: blue-grey
      accent: light-green
      toggle:
        icon: material/weather-night
        name: Modo Escuro
  
  # Fontes amigáveis e legíveis
  font:
    text: Poppins
    code: Fira Code
  
  # Ícones temáticos
  icon:
    repo: fontawesome/brands/github
    logo: material/hospital-building
    admonition:
      note: fontawesome/solid/circle-info
      abstract: fontawesome/solid/chart-line
      info: fontawesome/solid/heart-pulse
      tip: fontawesome/solid/lightbulb
      success: fontawesome/solid/check-circle
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/skull
      danger: fontawesome/solid/radiation
      bug: fontawesome/solid/bug
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left

# Plugins
plugins:
  - search

# Extensões Markdown
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - footnotes
  - toc:
      permalink: true
      permalink_title: Link direto
      toc_depth: 3

# Navegação principal
nav:
  - 🏠 Início: index.md
  - 🚀 Visão Geral: visao-geral.md
  - 🏗️ Arquitetura: arquitetura.md
  - 📊 Métricas: metricas.md
  - 🧪 Testes: testes.md
  - 📋 Backlog: backlog.md 
  - 📝 Atas:
    - 📄 Ata 23/04: atas/ata-2025-04-23.md
    - 📄 Ata 02/05: atas/ata-2025-05-02.md

# Estilos extras
extra_css:
  - stylesheets/clinica-theme.css

# JavaScript extras
extra_javascript:
  - javascripts/clinica-effects.js

# Configurações extras
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SEU-USUARIO/unbilidade-docs
      name: GitHub
    - icon: fontawesome/brands/jira
      link: https://seu-jira.atlassian.net
      name: Jira
    - icon: fontawesome/solid/heart-pulse
      link: /
      name: Saúde e Bem-estar
  
  generator: false